<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Seguimiento de Acuerdos</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f4f4f4; }
    .progress { height: 20px; background: #eee; border-radius: 5px; }
    .progress-bar { height: 100%; background: #4caf50; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>Control de Acuerdos Hospitalarios</h1>

  <form id="acuerdoForm">
    <input type="text" name="acuerdo" placeholder="Acuerdo" required>
    <input type="text" name="actividad" placeholder="Actividad" required>
    <input type="text" name="responsable" placeholder="Responsable" required>
    <input type="date" name="fechap" required>
    <input type="date" name="fechac">
    <input type="text" name="resultados" placeholder="Resultados">
    <input type="text" name="observaciones" placeholder="Observaciones">
    <input type="number" name="valorPonderado" placeholder="Valor Ponderado" required>
    <button type="submit">Crear Acuerdo</button>
  </form>

  <table id="acuerdosTable">
    <thead>
      <tr>
        <th>ID</th><th>Acuerdo</th><th>Actividad</th><th>Responsable</th>
        <th>FechP</th><th>FechC</th><th>Resultados</th><th>Obs</th>
        <th>Valor</th><th>Checklist</th><th>PDF</th><th>Acciones</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const API_URL = 'TU_WEBAPP_URL_AQUI';

    async function fetchAcuerdos() {
      const res = await fetch(`${API_URL}?action=read`);
      const data = await res.json();
      renderTable(data);
    }

    function renderTable(data) {
      const tbody = document.querySelector('#acuerdosTable tbody');
      tbody.innerHTML = '';
      data.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${row.ID_ACUERDO}</td>
          <td>${row.ACUERDO}</td>
          <td>${row.ACTIVIDAD}</td>
          <td>${row.RESPONSABLE}</td>
          <td>${row.FECHAP}</td>
          <td>${row.FECHAC}</td>
          <td>${row.RESULTADOS}</td>
          <td>${row.OBSERVACIONES}</td>
          <td>${row.VALOR_PONDERADO}</td>
          <td>${row.CHECKLIST}</td>
          <td>${row.DOCUMENTO_PDF ? `<a href="${row.DOCUMENTO_PDF}" target="_blank">📎</a>` : ''}</td>
          <td>
            <button onclick="deleteAcuerdo(${row.ID_ACUERDO})">Eliminar</button>
            <input type="file" onchange="uploadPDF(${row.ID_ACUERDO}, this.files[0])">
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.getElementById('acuerdoForm').addEventListener('submit', async e => {
      e.preventDefault();
      const formData = new FormData(e.target);
      formData.append('action', 'create');
      const res = await fetch(API_URL, { method: 'POST', body: formData });
      const result = await res.json();
      alert('Acuerdo creado con ID ' + result.id);
      fetchAcuerdos();
    });

    async function deleteAcuerdo(id) {
      const formData = new FormData();
      formData.append('action', 'delete');
      formData.append('id', id);
      await fetch(API_URL, { method: 'POST', body: formData });
      fetchAcuerdos();
    }

    async function uploadPDF(id, file) {
      const formData = new FormData();
      formData.append('action', 'uploadPDF');
      formData.append('id', id);
      formData.append('file', file);
      const res = await fetch(API_URL, { method: 'POST', body: formData });
      const result = await res.json();
      alert('PDF subido: ' + result.url);
      fetchAcuerdos();
    }

    fetchAcuerdos();
  </script>
</body>
</html>
