<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acuerdos y Actividades</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f4f4f4; }
    .progress { height: 20px; background: #eee; border-radius: 5px; }
    .progress-bar { height: 100%; background: #4caf50; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>Control de Acuerdos y Actividades</h1>

  <table id="acuerdosTable">
    <thead>
      <tr>
        <th>ID</th><th>Acuerdo</th><th>Responsable</th><th>FechP</th><th>FechC</th>
        <th>Obs</th><th>PDF</th><th>Progreso</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyNfAfd9ZYjuzHDNDGxE0Toh1_3iRwZITTk9taiized6pEJOknstQNEe1dPbs2gQVb5DQ/exec';

    function formatDate(dateString) {
      if (!dateString) return '';
      const d = new Date(dateString);
      if (isNaN(d)) return dateString;
      const day = String(d.getDate()).padStart(2,'0');
      const month = String(d.getMonth()+1).padStart(2,'0');
      const year = d.getFullYear();
      return `${day}/${month}/${year}`;
    }

    async function fetchAcuerdos() {
      const res = await fetch(`${API_URL}?action=read`);
      const data = await res.json();
      renderTable(data);
    }

    function renderTable(data) {
      const tbody = document.querySelector('#acuerdosTable tbody');
      tbody.innerHTML = '';
      data.forEach(acuerdo => {
        // Calcular progreso
        let total = 0, completado = 0;
        acuerdo.ACTIVIDADES.forEach(act => {
          const valor = parseInt(act.VALOR_PONDERADO) || 0;
          total += valor;
          if (act.CHECKLIST === '✓') completado += valor;
        });
                const porcentaje = total > 0 ? (completado / total) * 100 : 0;
        
        const row = tbody.insertRow();
        row.insertCell(0).textContent = acuerdo.ID;
        row.insertCell(1).textContent = acuerdo.ACUERDO;
        row.insertCell(2).textContent = acuerdo.RESPONSABLE;
        row.insertCell(3).textContent = formatDate(acuerdo.FECH_P);
        row.insertCell(4).textContent = formatDate(acuerdo.FECH_C);
        row.insertCell(5).textContent = acuerdo.OBSERVACION || '';
        
        // Celda PDF (enlace)
        const pdfCell = row.insertCell(6);
        if (acuerdo.PDF_URL) {
          const link = document.createElement('a');
          link.href = acuerdo.PDF_URL;
          link.textContent = 'Ver PDF';
          link.target = '_blank';
          pdfCell.appendChild(link);
        }
        
        // Celda Progreso
        const progressCell = row.insertCell(7);
        progressCell.innerHTML = `
          <div class="progress">
            <div class="progress-bar" style="width: ${porcentaje}%"></div>
          </div>
          <span>${porcentaje.toFixed(0)}%</span>
        `;
      });
    }

    // Inicializar
    fetchAcuerdos();
  </script>
</body>
</html>
