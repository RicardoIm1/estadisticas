<!DOCTYPE html>
<html>
<head>
  <title>Prueba COCASEP</title>
</head>
<body>
  <h1>Prueba de conexión</h1>
  <button onclick="testRead()">Probar Leer</button>
  <button onclick="testCreate()">Probar Crear</button>
  <pre id="resultado"></pre>

  <script>
    // ⚠️ REEMPLAZA CON TU URL REAL
    const API_URL = 'https://script.google.com/macros/s/AKfycbybqetiova5FCh8OX2A84VRYwe-Mlhh6DMXBf9fCZzeQPzPxlJH8BLdgRX6CmVzCzBFDA/exec';
    
    async function testRead() {
      const resultado = document.getElementById('resultado');
      resultado.innerText = 'Probando GET...\n';
      
      try {
        const response = await fetch(API_URL + '?action=read');
        const text = await response.text();
        resultado.innerText += 'Respuesta GET:\n' + text;
      } catch (error) {
        resultado.innerText += 'Error: ' + error.message;
      }
    }
    
    async function testCreate() {
      const resultado = document.getElementById('resultado');
      resultado.innerText = 'Probando POST...\n';
      
      try {
        const formData = new URLSearchParams();
        formData.append('action', 'createAcuerdo');
        formData.append('acuerdo', 'Acuerdo de prueba');
        formData.append('responsable', 'Usuario Test');
        formData.append('fechap', '2024-01-01');
        formData.append('fechac', '2024-12-31');
        
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData.toString()
        });
        
        const text = await response.text();
        resultado.innerText += 'Respuesta POST:\n' + text;
      } catch (error) {
        resultado.innerText += 'Error: ' + error.message;
      }
    }
  </script>
</body>
</html>
