<!DOCTYPE html>
<html>
<head>
  <title>Diagnóstico COCASEP</title>
</head>
<body>
  <h1>Diagnóstico</h1>
  <button onclick="test()">Probar conexión</button>
  <pre id="output"></pre>

  <script>
    // ⚠️ REEMPLAZA CON TU URL REAL (la que te dio Google)
    const API_URL = 'https://script.google.com/macros/s/AKfycbz5hhZ2DDsWr36egYQhPrO8mjY54bxd2a_m0AokwBv20YClsJ-3byDJ8BlH02bYrV33Qg/exec?action=read';
    
    async function test() {
      const output = document.getElementById('output');
      output.textContent = 'Conectando...\n';
      
      // Probar GET con action=read
      try {
        output.textContent += `GET ${API_URL}?action=read\n`;
        const response = await fetch(`${API_URL}?action=read`);
        const text = await response.text();
        output.textContent += `Respuesta GET: ${text}\n\n`;
      } catch (error) {
        output.textContent += `Error GET: ${error.message}\n\n`;
      }
      
      // Probar POST para crear
      try {
        output.textContent += `POST ${API_URL}\n`;
        const formData = new URLSearchParams();
        formData.append('action', 'createAcuerdo');
        formData.append('acuerdo', 'Prueba desde diagnóstico');
        formData.append('responsable', 'Admin');
        
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData.toString()
        });
        const text = await response.text();
        output.textContent += `Respuesta POST: ${text}\n`;
      } catch (error) {
        output.textContent += `Error POST: ${error.message}\n`;
      }
    }
  </script>
</body>
</html>
