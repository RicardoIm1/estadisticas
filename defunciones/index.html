<style>
  #tabla-registros td:nth-child(2) {
    white-space: normal;
    word-break: break-word;
  }

  /* Iframe oculto para enviar formularios */
  #form-iframe {
    display: none;
    width: 0;
    height: 0;
    border: none;
  }

  /* Estilos para el modal de gráfica */
  .modal-grafica-backdrop {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 9999;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.3s ease;
  }

  .modal-grafica-backdrop.active {
    display: flex;
  }

  .modal-grafica {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 30px;
    max-width: 800px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.2);
    animation: slideUp 0.4s ease;
    position: relative;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }

  @keyframes slideUp {
    from {
      transform: translateY(30px) scale(0.95);
      opacity: 0;
    }
    to {
      transform: translateY(0) scale(1);
      opacity: 1;
    }
  }

  .modal-grafica-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 2px solid rgba(0, 0, 0, 0.1);
  }

  .modal-grafica-header h2 {
    margin: 0;
    font-size: 1.5rem;
    color: #2d3436;
  }

  .modal-grafica-header h2 i {
    color: #e17055;
    margin-right: 10px;
  }

  .btn-cerrar-grafica {
    background: none;
    border: none;
    font-size: 1.8rem;
    color: #636e72;
    cursor: pointer;
    transition: all 0.3s ease;
    padding: 5px 10px;
    border-radius: 8px;
  }

  .btn-cerrar-grafica:hover {
    background: #ff7675;
    color: white;
    transform: rotate(90deg);
  }

  .grafica-container {
    position: relative;
    height: 400px;
  }

  .grafica-container canvas {
    width: 100% !important;
    height: 100% !important;
  }

  .grafica-leyenda {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
    padding: 15px;
    background: rgba(0, 0, 0, 0.05);
    border-radius: 12px;
  }

  .leyenda-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
    font-weight: 500;
  }

  .leyenda-color {
    width: 20px;
    height: 20px;
    border-radius: 4px;
  }

  .leyenda-color.mujeres {
    background: #fd79a8;
  }

  .leyenda-color.hombres {
    background: #0984e3;
  }

  .btn-grafica {
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
    box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
  }

  .btn-grafica:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(108, 92, 231, 0.5);
  }

  .btn-grafica i {
    font-size: 1.1rem;
  }

  /* Botón de gráfica en el header */
  .header-actions {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .modal-grafica {
      padding: 20px;
      width: 95%;
    }
    .modal-grafica-header h2 {
      font-size: 1.2rem;
    }
    .grafica-container {
      height: 300px;
    }
  }
</style>

  <script>
    // Footer dinámico
    document.getElementById('footerText').innerHTML =
      `Hecho con ❤️ por Ricardo · ${new Date().getFullYear()}`;

    // ========== FUNCIÓN PARA FORMATEAR FECHAS ==========
    function formatearFecha(fechaString) {
      if (!fechaString) return '-';

      try {
        // Si ya es una fecha válida en formato simple
        if (/^\d{4}-\d{2}-\d{2}$/.test(fechaString)) {
          const fecha = new Date(fechaString + 'T00:00:00');
          return fecha.toLocaleDateString('es-ES', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric'
          });
        }

        // Si viene con hora (formato completo)
        const fecha = new Date(fechaString);

        // Verificar si es una fecha válida
        if (isNaN(fecha.getTime())) {
          return '-';
        }

        // Formatear a DD/MM/YYYY
        return fecha.toLocaleDateString('es-ES', {
          day: '2-digit',
          month: '2-digit',
          year: 'numeric'
        });
      } catch (error) {
        console.error('Error formateando fecha:', fechaString, error);
        return '-';
      }
    }

    // ========== estadoSistema.js ==========
    function setEstado(estado) {
      const dashboard = document.querySelector('.glass');

      if (!dashboard) {
        console.warn('⚠️ No se encontró el contenedor .glass');
        return;
      }

      dashboard.style.transition = 'background 0.5s ease, box-shadow 0.8s ease, border 0.5s ease';
      dashboard.classList.remove('loading', 'success', 'error');

      switch (estado) {
        case 'loading':
          dashboard.classList.add('loading');
          break;
        case 'success':
          dashboard.classList.add('success');
          break;
        case 'error':
          dashboard.classList.add('error');
          break;
      }

      // 🔄 Restaurar a cristalino en 5 s
      setTimeout(() => {
        dashboard.style.transition = 'background 5s ease, box-shadow 5s ease, border 5s ease';
        dashboard.classList.remove('loading', 'success', 'error');
      }, 5000);
    }

    // ========== app.js ==========
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzTd3NQZuEKXIrIjI9qTRBolbeB9RlJ0d0RETuPunYQqE2Xz4860uiwAqGKiXXg3mfK/exec";

    // Variables globales
    let idParaEliminar = null;
    let chartInstance = null;

    // Función para cargar datos
    async function cargarRegistros() {
      try {
        console.log('🔄 Cargando registros...');
        setEstado('loading');

        const response = await fetch(GAS_URL);
        const text = await response.text();
        const data = JSON.parse(text);

        if (data.success) {
          // Ordenar por ID antes de mostrar
          if (data.rows && data.rows.length > 0) {
            data.rows.sort((a, b) => parseInt(b.id) - parseInt(a.id));
          }
          mostrarTabla(data.rows);
          // Guardar registros globalmente para la gráfica
          window.registrosGlobales = data.rows || [];
          setEstado('success');
        } else {
          throw new Error(data.error || 'Error del servidor');
        }
      } catch (error) {
        console.error('❌ Error:', error);
        setEstado('error');
        document.getElementById('tabla-registros').innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 2rem; color: #ff6b6b;">Error cargando datos</td></tr>';
      }
    }

    // FUNCIÓN MODIFICADA: Mostrar tabla con orden por FECHA descendente y luego por FOLIO
    function mostrarTabla(registros) {
      const tbody = document.getElementById('tabla-registros');
      tbody.innerHTML = '';

      if (!registros || registros.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 2rem;">No hay registros</td></tr>';
        return;
      }

      // Ordenar registros por FECHA descendente (más reciente primero) y luego por FOLIO
      const registrosOrdenados = [...registros].sort((a, b) => {
        // Primero ordenar por fecha (descendente)
        const fechaA = a.fechaDefuncion ? new Date(a.fechaDefuncion) : new Date(0);
        const fechaB = b.fechaDefuncion ? new Date(b.fechaDefuncion) : new Date(0);

        // Si las fechas son diferentes, ordenar por fecha (más reciente primero)
        if (fechaA.getTime() !== fechaB.getTime()) {
          return fechaB.getTime() - fechaA.getTime();
        }

        // Si las fechas son iguales, ordenar por folio (ascendente)
        const folioA = a.folio || '';
        const folioB = b.folio || '';

        // Extraer el número del folio
        const numA = extraerNumeroFolio(folioA);
        const numB = extraerNumeroFolio(folioB);

        // Si ambos tienen números válidos, ordenar numéricamente
        if (numA !== null && numB !== null) {
          return numA - numB;
        }

        // Si no, ordenar alfabéticamente
        return String(folioA).localeCompare(String(folioB));
      });

      registrosOrdenados.forEach((registro, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
      <td>${index + 1}</td>
      <td>${registro.folio || '-'}</td>
      <td>${registro.nombre || ''}</td>
      <td>${formatearFecha(registro.fechaDefuncion)}</td>
      <td>${registro.area || ''}</td>
      <td>
        <div class="acciones-tabla">
          <button class="btn-editar" onclick="editar('${registro.id}')" title="Editar registro">
            <i class="fas fa-edit"></i>
          </button>
          <button class="btn-eliminar" onclick="solicitarEliminar('${registro.id}')" title="Eliminar registro">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </td>
    `;
        tbody.appendChild(tr);
      });
    }

    // Función auxiliar para extraer el número del folio (CORREGIDA)
    function extraerNumeroFolio(folio) {
      // Si es null, undefined o vacío, retornar null
      if (folio === null || folio === undefined || folio === '') {
        return null;
      }

      // Convertir a string por si acaso
      const folioStr = String(folio);

      // Buscar el último número en el folio
      const match = folioStr.match(/\d+$/);
      if (match) {
        return parseInt(match[0], 10);
      }

      // Si no encuentra número al final, intentar extraer todos los números
      const todosNumeros = folioStr.match(/\d+/g);
      if (todosNumeros) {
        // Tomar el último grupo de números (generalmente es el número secuencial)
        return parseInt(todosNumeros[todosNumeros.length - 1], 10);
      }

      return null;
    }

    // NUEVA FUNCIÓN: Agregar registro al top sin recargar
    function agregarRegistroAlTop(registro) {
      const tbody = document.getElementById('tabla-registros');

      // Si hay un mensaje de "No hay registros" o "Cargando...", limpiarlo
      if (tbody.children.length === 1 &&
        (tbody.children[0].textContent.includes('No hay registros') ||
          tbody.children[0].textContent.includes('Cargando'))) {
        tbody.innerHTML = '';
      }

      // Buscar la posición correcta según el orden (fecha descendente, folio ascendente)
      let posicionInsertar = 0;
      const filas = tbody.querySelectorAll('tr');

      for (let i = 0; i < filas.length; i++) {
        const fila = filas[i];
        const fechaFila = fila.querySelector('td:nth-child(4)').textContent;
        const folioFila = fila.querySelector('td:nth-child(2)').textContent;

        // Convertir fecha de DD/MM/YYYY a objeto Date para comparar
        const partes = fechaFila.split('/');
        const fechaObj = partes.length === 3 ? new Date(partes[2], partes[1] - 1, partes[0]) : new Date(0);
        const fechaNuevo = registro.fechaDefuncion ? new Date(registro.fechaDefuncion) : new Date(0);

        // Comparar fechas
        if (fechaObj.getTime() < fechaNuevo.getTime()) {
          posicionInsertar = i;
          break;
        } else if (fechaObj.getTime() === fechaNuevo.getTime()) {
          // Si misma fecha, comparar por folio (numéricamente)
          const numFila = extraerNumeroFolio(folioFila);
          const numNuevo = extraerNumeroFolio(registro.folio);

          if (numFila !== null && numNuevo !== null) {
            if (numFila > numNuevo) {
              posicionInsertar = i;
              break;
            }
          } else {
            // Si no se pueden extraer números, comparar alfabéticamente
            const folioFilaStr = String(folioFila || '');
            const folioNuevoStr = String(registro.folio || '');
            if (folioFilaStr.localeCompare(folioNuevoStr) > 0) {
              posicionInsertar = i;
              break;
            }
          }
        }

        posicionInsertar = i + 1;
      }

      // Crear nueva fila
      const tr = document.createElement('tr');
      tr.innerHTML = `
    <td>${posicionInsertar + 1}</td>
    <td>${registro.folio || '-'}</td>
    <td>${registro.nombre || ''}</td>
    <td>${formatearFecha(registro.fechaDefuncion)}</td>
    <td>${registro.area || ''}</td>
    <td>
      <div class="acciones-tabla">
        <button class="btn-editar" onclick="editar('${registro.id}')" title="Editar registro">
          <i class="fas fa-edit"></i>
        </button>
        <button class="btn-eliminar" onclick="solicitarEliminar('${registro.id}')" title="Eliminar registro">
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </td>
  `;

      // Insertar en la posición correcta
      if (posicionInsertar === 0) {
        tbody.insertBefore(tr, tbody.firstChild);
      } else if (posicionInsertar >= filas.length) {
        tbody.appendChild(tr);
      } else {
        tbody.insertBefore(tr, filas[posicionInsertar]);
      }

      // Renumerar todas las filas
      const filasActualizadas = tbody.querySelectorAll('tr');
      filasActualizadas.forEach((fila, index) => {
        fila.querySelector('td:first-child').textContent = index + 1;
      });
    }

    // FUNCIÓN MODIFICADA: Guardar registro optimizado
    async function guardar(e) {
      e.preventDefault();

      const id = document.getElementById('id').value;
      const datos = {
        folio: document.getElementById('folio').value,
        nombre: document.getElementById('nombre').value,
        fechaDefuncion: document.getElementById('fechaDefuncion').value,
        area: document.getElementById('area').value,
        edad: document.getElementById('edad').value,
        sexo: document.getElementById('sexo').value,
        diagnostico: document.getElementById('diagnostico').value,
        expediente: document.getElementById('expediente').value,
        medico: document.getElementById('medico').value,
        observaciones: document.getElementById('observaciones').value
      };

      if (!datos.nombre) {
        setEstado('error');
        alert('❌ El nombre es obligatorio');
        return;
      }

      console.log('💾 Enviando datos:', datos);
      setEstado('loading');

      // Crear formulario dinámico
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = GAS_URL;
      form.target = 'form-iframe';
      form.style.display = 'none';

      // Agregar campos
      const campos = {
        action: id ? 'updateData' : 'createData',
        ...datos
      };

      if (id) campos.id = id;

      Object.keys(campos).forEach(key => {
        const input = document.createElement('input');
        input.name = key;
        input.value = campos[key] || '';
        form.appendChild(input);
      });

      // Agregar formulario al body y enviar
      document.body.appendChild(form);
      form.submit();

      // Optimización: recargar solo si es necesario
      setTimeout(() => {
        document.body.removeChild(form);
        setEstado('success');
        limpiarForm();

        // Si es un nuevo registro, solo añadir al principio sin recargar todo
        if (!id) {
          // Crear un objeto con los datos del nuevo registro
          const nuevoRegistro = {
            id: Date.now().toString(), // ID temporal
            folio: datos.folio || '-',
            nombre: datos.nombre,
            fechaDefuncion: datos.fechaDefuncion || '',
            area: datos.area || '',
            edad: datos.edad || '',
            sexo: datos.sexo || '',
            diagnostico: datos.diagnostico || '',
            expediente: datos.expediente || '',
            medico: datos.medico || '',
            observaciones: datos.observaciones || ''
          };

          // Añadir al principio de la tabla
          agregarRegistroAlTop(nuevoRegistro);
          // Actualizar registros globales para la gráfica
          if (window.registrosGlobales) {
            window.registrosGlobales.push(nuevoRegistro);
          }
        } else {
          // Si es edición, recargar todo para actualizar
          cargarRegistros();
        }
      }, 1500);
    }

    // FUNCIÓN MODIFICADA: Eliminar registro optimizado
    async function eliminarConfirmado() {
      if (!idParaEliminar) return;

      try {
        setEstado('loading');

        // Crear formulario dinámico
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = GAS_URL;
        form.target = 'form-iframe';
        form.style.display = 'none';

        const inputAction = document.createElement('input');
        inputAction.name = 'action';
        inputAction.value = 'deleteData';
        form.appendChild(inputAction);

        const inputId = document.createElement('input');
        inputId.name = 'id';
        inputId.value = idParaEliminar;
        form.appendChild(inputId);

        // Agregar formulario al body y enviar
        document.body.appendChild(form);
        form.submit();

        // Esperar un momento para que se procese
        setTimeout(() => {
          document.body.removeChild(form);
          setEstado('success');
          cerrarModal();

          // Eliminar la fila del DOM sin recargar todo
          const filas = document.querySelectorAll('#tabla-registros tr');
          filas.forEach((fila) => {
            const botonEliminar = fila.querySelector('.btn-eliminar');
            if (botonEliminar) {
              const onclickAttr = botonEliminar.getAttribute('onclick');
              if (onclickAttr && onclickAttr.includes(idParaEliminar)) {
                fila.remove();
                // Renumerar filas restantes
                const filasRestantes = document.querySelectorAll('#tabla-registros tr');
                filasRestantes.forEach((f, i) => {
                  const firstTd = f.querySelector('td:first-child');
                  if (firstTd) {
                    firstTd.textContent = i + 1;
                  }
                });
              }
            }
          });
          
          // Actualizar registros globales para la gráfica
          if (window.registrosGlobales) {
            window.registrosGlobales = window.registrosGlobales.filter(r => r.id !== idParaEliminar);
          }
        }, 1500);

      } catch (error) {
        console.error('❌ Error eliminando:', error);
        setEstado('error');
        alert('❌ Error eliminando: ' + error.message);
        cerrarModal();
      }
    }

    // Función para solicitar eliminación
    function solicitarEliminar(id) {
      idParaEliminar = id;
      const modal = document.getElementById('modalEliminar');
      const modalContent = modal.querySelector('.modal');

      modal.style.display = 'flex';
      setTimeout(() => {
        modalContent.classList.add('show');
      }, 10);
    }

    function cerrarModal() {
      const modal = document.getElementById('modalEliminar');
      const modalContent = modal.querySelector('.modal');

      modalContent.classList.remove('show');
      setTimeout(() => {
        modal.style.display = 'none';
        idParaEliminar = null;
      }, 300);
    }

    // Editar registro
    async function editar(id) {
      try {
        setEstado('loading');

        const response = await fetch(GAS_URL);
        const data = await response.json();

        if (data.success) {
          const registro = data.rows.find(r => r.id === id);
          if (registro) {
            document.getElementById('id').value = registro.id;
            document.getElementById('folio').value = registro.folio || '';
            document.getElementById('nombre').value = registro.nombre || '';

            // Formatear la fecha para el input date (necesita formato YYYY-MM-DD)
            if (registro.fechaDefuncion) {
              const fecha = new Date(registro.fechaDefuncion);
              if (!isNaN(fecha.getTime())) {
                document.getElementById('fechaDefuncion').value = fecha.toISOString().split('T')[0];
              } else {
                document.getElementById('fechaDefuncion').value = '';
              }
            } else {
              document.getElementById('fechaDefuncion').value = '';
            }

            document.getElementById('area').value = registro.area || '';
            document.getElementById('edad').value = registro.edad || '';
            document.getElementById('sexo').value = registro.sexo || '';
            document.getElementById('diagnostico').value = registro.diagnostico || '';
            document.getElementById('expediente').value = registro.expediente || '';
            document.getElementById('medico').value = registro.medico || '';
            document.getElementById('observaciones').value = registro.observaciones || '';

            // Cambiar texto del botón
            document.getElementById('btn-guardar').innerHTML = '<i class="fas fa-sync-alt"></i> Actualizar';
            document.getElementById('btn-cancelar').style.display = 'block';

            setEstado('success');
            document.querySelector('.formulario').scrollIntoView({ behavior: 'smooth' });
          }
        }
      } catch (error) {
        setEstado('error');
        alert('❌ Error cargando registro para editar');
      }
    }

    // Cancelar edición
    function cancelarEdicion() {
      limpiarForm();
      setEstado('success');
    }

    // Limpiar formulario
    function limpiarForm() {
      document.getElementById('crud-form').reset();
      document.getElementById('id').value = '';
      document.getElementById('btn-guardar').innerHTML = '<i class="fas fa-save"></i> Guardar';
      document.getElementById('btn-cancelar').style.display = 'none';
      setEstado('success');
    }

    // ========== FUNCIONES PARA LA GRÁFICA ==========
    function generarDatosGrafica(registros) {
      // Agrupar por mes y sexo
      const datosPorMes = {};
      
      registros.forEach(registro => {
        if (!registro.fechaDefuncion) return;
        
        const fecha = new Date(registro.fechaDefuncion);
        if (isNaN(fecha.getTime())) return;
        
        const mesKey = `${fecha.getFullYear()}-${String(fecha.getMonth() + 1).padStart(2, '0')}`;
        const mesLabel = fecha.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
        
        if (!datosPorMes[mesKey]) {
          datosPorMes[mesKey] = {
            label: mesLabel,
            mujeres: 0,
            hombres: 0
          };
        }
        
        const sexo = registro.sexo || '';
        if (sexo === 'Femenino') {
          datosPorMes[mesKey].mujeres++;
        } else if (sexo === 'Masculino') {
          datosPorMes[mesKey].hombres++;
        }
      });
      
      // Ordenar por fecha
      const mesesOrdenados = Object.keys(datosPorMes).sort();
      
      return {
        labels: mesesOrdenados.map(key => datosPorMes[key].label),
        mujeres: mesesOrdenados.map(key => datosPorMes[key].mujeres),
        hombres: mesesOrdenados.map(key => datosPorMes[key].hombres)
      };
    }

    function crearGrafica() {
      const ctx = document.getElementById('graficaDefunciones').getContext('2d');
      
      // Destruir gráfica anterior si existe
      if (chartInstance) {
        chartInstance.destroy();
      }
      
      const registros = window.registrosGlobales || [];
      const datos = generarDatosGrafica(registros);
      
      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: datos.labels,
          datasets: [
            {
              label: 'Mujeres',
              data: datos.mujeres,
              backgroundColor: 'rgba(253, 121, 168, 0.8)',
              borderColor: 'rgba(253, 121, 168, 1)',
              borderWidth: 2,
              borderRadius: 4
            },
            {
              label: 'Hombres',
              data: datos.hombres,
              backgroundColor: 'rgba(9, 132, 227, 0.8)',
              borderColor: 'rgba(9, 132, 227, 1)',
              borderWidth: 2,
              borderRadius: 4
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  let label = context.dataset.label || '';
                  let value = context.parsed.y || 0;
                  return label + ': ' + value + ' defunciones';
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                stepSize: 1
              },
              grid: {
                color: 'rgba(0, 0, 0, 0.05)'
              }
            },
            x: {
              grid: {
                display: false
              }
            }
          }
        }
      });
    }

    function abrirGrafica() {
      const modal = document.getElementById('modalGrafica');
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
      
      // Crear la gráfica con un pequeño retraso para que el modal se renderice
      setTimeout(() => {
        crearGrafica();
      }, 100);
    }

    function cerrarGrafica() {
      const modal = document.getElementById('modalGrafica');
      modal.classList.remove('active');
      document.body.style.overflow = '';
      
      // Destruir gráfica al cerrar
      if (chartInstance) {
        chartInstance.destroy();
        chartInstance = null;
      }
    }

    // Inicialización
    document.addEventListener('DOMContentLoaded', function () {
      console.log('🚀 Iniciando aplicación...');

      document.getElementById('crud-form').addEventListener('submit', guardar);
      document.getElementById('btn-limpiar').addEventListener('click', limpiarForm);
      document.getElementById('btn-cancelar').addEventListener('click', cancelarEdicion);
      document.getElementById('btnConfirmarEliminar').addEventListener('click', eliminarConfirmado);
      document.getElementById('btnCancelarEliminar').addEventListener('click', cerrarModal);
      
      // Eventos para la gráfica
      document.getElementById('btnAbrirGrafica').addEventListener('click', abrirGrafica);
      document.getElementById('btnCerrarGrafica').addEventListener('click', cerrarGrafica);
      
      // Cerrar modal de gráfica al hacer clic fuera
      document.getElementById('modalGrafica').addEventListener('click', function (e) {
        if (e.target === this) {
          cerrarGrafica();
        }
      });

      // Cerrar modal de eliminación al hacer clic fuera
      document.getElementById('modalEliminar').addEventListener('click', function (e) {
        if (e.target === this) {
          cerrarModal();
        }
      });

      // Cargar datos
      cargarRegistros();
    });

    // Funciones globales para los botones
    window.editar = editar;
    window.solicitarEliminar = solicitarEliminar;
    window.abrirGrafica = abrirGrafica;
    window.cerrarGrafica = cerrarGrafica;

  </script>

  <script>
    // Verificar si el usuario está logueado
    function verificarAutenticacion() {
      const usuario = localStorage.getItem('usuario');
      const rol = localStorage.getItem('rol');

      if (!usuario) {
        window.location.href = '/estadisticas/login.html';
        return;
      }

      // Mostrar información del usuario
      console.log('Usuario:', usuario, 'Rol:', rol);

      // Mostrar en la interfaz
      const userElement = document.getElementById('user-info');
      if (userElement) {
        userElement.innerHTML = `${usuario} (${rol})`;
      }
    }

    // Cerrar sesión
    function cerrarSesion() {
      localStorage.removeItem('usuario');
      localStorage.removeItem('rol');
      localStorage.removeItem('loginTime');
      window.location.href = 'index.html';
    }

    // Verificar al cargar la página
    window.addEventListener('load', verificarAutenticacion);
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const buscador = document.getElementById("buscador");
      const filas = document.getElementById("tabla-registros");

      if (!buscador || !filas) return;

      buscador.addEventListener("keyup", function () {
        const valor = this.value.toLowerCase().trim();
        const registros = filas.querySelectorAll("tr");

        registros.forEach(fila => {
          const textoFila = fila.textContent.toLowerCase();
          fila.style.display = textoFila.includes(valor) ? "" : "none";
        });
      });
    });
  </script>
