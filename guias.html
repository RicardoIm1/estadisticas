<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Guías de práctica clínica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* === BASE GENERAL === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #2c3e50, #4a6a85, #7dacbf);
      background-attachment: fixed;
      overflow: hidden;
      color: white;
      font-size: clamp(0.85rem, 0.9vw, 0.85rem);
    }

    /* === ESTRUCTURA FLEXIBLE === */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2vh;
    }

    /* === PANEL PRINCIPAL (GLASS) === */
    .glass {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 80vh;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.3s ease;
      padding: 1rem;
      width: min(92%, 1600px);
    }

    /* === HEADER === */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.25rem;
      padding: 0.1rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      margin-bottom: 0.25rem;
      flex-shrink: 0;
    }

    .logo,
    .usuario {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .logo h1 {
      font-size: clamp(1rem, 1.5vw, 1.4rem);
      font-weight: 600;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.15);
    }

    .logo-icon {
      font-size: 2.5rem;
      color: #ffdd00;
    }

    /* === BUSCADOR === */
    .buscador-wrapper {
      position: sticky;
      top: 0;
      left: 0;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      padding: 0.6rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      z-index: 10;
      text-align: left;
    }

    #buscador {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 25px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 0.95rem;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
    }

    #buscador:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
    }

    #buscador::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    /* === CONTENIDO === */
    .contenido {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      margin: 1rem 0;
      padding-right: 0.5rem;
    }

    .contenido::-webkit-scrollbar {
      width: 8px;
    }

    .contenido::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
    }

    .contenido::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }

    /* === GRID DE CARDS === */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
      grid-auto-rows: minmax(90px, auto);
    }

    /* === CARDS === */
    .celda {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      will-change: transform, box-shadow;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .celda:hover {
      transform: translateY(-3px) scale(1.02);
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .celda h3 {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-bottom: 0.2rem;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 400;
    }

    .celda h2 {
      font-size: 1.05rem;
      margin-bottom: 0.3rem;
      font-weight: 500;
      color: white;
      line-height: 1.2;
    }

    /* === BOTONES EN CARDS === */
    .btn-group {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 0.3rem;
    }

    .btn-link {
      display: inline-block;
      padding: 0.4rem 0.9rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white !important;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.75rem;
      transition: all 0.2s ease;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    .btn-link:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    .btn-completa {
      background: rgba(0, 102, 204, 0.6);
      border-color: rgba(0, 102, 204, 0.3);
    }

    .btn-completa:hover {
      background: rgba(0, 102, 204, 0.8);
    }

    .btn-rapida {
      background: rgba(0, 170, 102, 0.6);
      border-color: rgba(0, 170, 102, 0.3);
    }

    .btn-rapida:hover {
      background: rgba(0, 170, 102, 0.8);
    }

    /* === LOADER === */
    #loader {
      display: none;
      text-align: center;
      margin: 20px;
    }

    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid #ffdd00;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    /* === PAGINADOR === */
    #paginador {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 0.5rem 0;
      flex-shrink: 0;
    }

    #paginador button {
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Poppins', sans-serif;
    }

    #paginador button:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    #paginador button:active:not(:disabled) {
      transform: scale(0.95);
    }

    #paginador button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
    }

    /* === FOOTER === */
    .glass footer {
      flex-shrink: 0;
      margin-top: auto;
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.7);
      padding: 0.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
    }

    .glass footer a {
      color: #ffdd00 !important;
      text-decoration: none !important;
      transition: color 0.3s ease;
    }

    .glass footer a:hover {
      color: white !important;
      text-decoration: none !important;
    }

    .glass footer .ref-institucional {
      font-size: 0.7rem;
      opacity: 0.6;
      margin-top: 0.2rem;
    }

    /* === RESPONSIVIDAD === */
    @media (max-width: 768px) {
      .glass {
        width: 95%;
        height: 92%;
        padding: 0.8rem;
      }

      .header {
        flex-direction: column;
        text-align: center;
        gap: 0.1rem;
      }

      .celda {
        padding: 0.8rem;
      }

      .celda h2 {
        font-size: 0.9rem;
      }

      .btn-link {
        font-size: 0.7rem;
        padding: 0.3rem 0.7rem;
      }

      .grid {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 0.8rem;
      }
    }

    @media (max-width: 480px) {
      .glass {
        padding: 0.6rem;
        height: 95vh;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 0.6rem;
      }

      .celda h2 {
        font-size: 0.85rem;
      }
    }
  </style>
</head>

<body>
  <div class="glass">
    <!-- HEADER -->
    <div class="header">
      <div class="logo">
        <span class="logo-icon">📋</span>
        <h1>Catálogo GPC</h1>
      </div>
      <div class="usuario">
        <span style="font-size: 0.8rem; opacity: 0.7;">Sistema de consulta</span>
      </div>
    </div>

    <!-- BUSCADOR -->
    <div class="buscador-wrapper">
      <input type="text" id="buscador" placeholder="🔍 Buscar guía por clave o nombre..." autofocus>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="contenido">
      <div id="loader">
        <div class="spinner"></div>
      </div>
      <div id="contenedor" class="grid"></div>
    </div>

    <!-- PAGINADOR -->
    <div id="paginador"></div>

    <!-- FOOTER -->
    <footer>
      <p>Hecho con ❤️ por
        <a href="https://ricardoim1.github.io/jeronimoricardo/" target="_blank">Ricardo</a>,
        Viri y Alex ·
        <span id="year"></span>
      </p>
      <p class="ref-institucional">
        Hospital Regional Puerto Vallarta. Estadísticas y Archivo Clínico &amp; Informática &amp; Asistente de Dirección
      </p>
    </footer>
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzMG7NjI7kRmXHe1HwH3d05f2Biz6Hqa83G2TU3lpMZtfEDMTGHAIlKTsSe5HNPN8TD/exec";
    let datosOriginales = [];
    let datosFiltrados = [];
    let paginaActual = 1;
    const registrosPorPagina = 18;

    document.getElementById("loader").style.display = "block";

    fetch(scriptURL)
      .then(res => res.json())
      .then(data => {
        datosOriginales = data;
        datosFiltrados = data;
        document.getElementById("loader").style.display = "none";
        renderPagina();
      })
      .catch(err => {
        console.error(err);
        document.getElementById("loader").style.display = "none";
        document.getElementById("contenedor").innerHTML = `
          <div style="grid-column:1/-1;text-align:center;padding:2rem;color:rgba(255,255,255,0.7);">
            <p>⚠️ Error al cargar los datos</p>
            <p style="font-size:0.8rem;">Intenta de nuevo más tarde</p>
          </div>
        `;
      });

    function renderPagina() {
      const contenedor = document.getElementById("contenedor");
      contenedor.innerHTML = "";
      const inicio = (paginaActual - 1) * registrosPorPagina;
      const fin = inicio + registrosPorPagina;
      const paginaDatos = datosFiltrados.slice(inicio, fin);

      if (paginaDatos.length === 0) {
        contenedor.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;padding:3rem;color:rgba(255,255,255,0.6);">
            <p style="font-size:1.2rem;">🔍 No se encontraron resultados</p>
            <p style="font-size:0.9rem;">Prueba con otra palabra clave</p>
          </div>
        `;
        document.getElementById("paginador").innerHTML = "";
        return;
      }

      paginaDatos.forEach(item => {
        const card = document.createElement("div");
        card.className = "celda";
        card.innerHTML = `
          <h3>${item.CLAVE}</h3>
          <h2>${item["NOMBRE GUIA"]}</h2>
          <div class="btn-group">
            <a href="${item.URL_COMPLETA}" target="_blank" class="btn-link btn-completa">Completa</a>
            <a href="${item.URL_RAPIDA}" target="_blank" class="btn-link btn-rapida">Rápida</a>
          </div>
        `;
        contenedor.appendChild(card);
      });

      renderPaginador();
    }

    function renderPaginador() {
      const paginador = document.getElementById("paginador");
      paginador.innerHTML = "";
      const totalPaginas = Math.ceil(datosFiltrados.length / registrosPorPagina);

      if (totalPaginas <= 1) {
        return;
      }

      const prevBtn = document.createElement("button");
      prevBtn.textContent = "◀ Anterior";
      prevBtn.disabled = paginaActual === 1;
      prevBtn.onclick = () => { paginaActual--; renderPagina(); };
      paginador.appendChild(prevBtn);

      const infoPag = document.createElement("span");
      infoPag.textContent = ` ${paginaActual} / ${totalPaginas} `;
      infoPag.style.cssText = "display:flex;align-items:center;color:rgba(255,255,255,0.7);font-size:0.85rem;";
      paginador.appendChild(infoPag);

      const nextBtn = document.createElement("button");
      nextBtn.textContent = "Siguiente ▶";
      nextBtn.disabled = paginaActual === totalPaginas;
      nextBtn.onclick = () => { paginaActual++; renderPagina(); };
      paginador.appendChild(nextBtn);
    }

    // === BUSCADOR CON IGNORAR ACENTOS ===
    document.getElementById("buscador").addEventListener("input", function(e) {
      const q = this.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      
      if (q === "") {
        datosFiltrados = datosOriginales;
      } else {
        datosFiltrados = datosOriginales.filter(item => {
          const clave = item.CLAVE.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
          const nombre = item["NOMBRE GUIA"].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
          return clave.includes(q) || nombre.includes(q);
        });
      }
      
      paginaActual = 1;
      renderPagina();
    });

    // === ACTUALIZAR AÑO ===
    document.getElementById("year").textContent = new Date().getFullYear();

    // === FOOTER LINK HANDLER ===
    document.addEventListener('click', function(e) {
      if (e.target.tagName === 'A' && e.target.href.includes('ricardoim1.github.io')) {
        e.preventDefault();
        window.open(e.target.href, '_blank');
      }
    });
  </script>
</body>

</html>
