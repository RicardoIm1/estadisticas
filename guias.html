<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Guías de práctica clínica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --main-color: #0066cc;
      --secondary-color: #00aa66;
    }

    /* Estructura base */
    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      background: #fff;
      color: #222;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: var(--main-color);
      color: #fff;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: 500;
      position: sticky;
      top: 0;
      z-index: 1000;
      margin-top: 70px;
      /* espacio para el buscador fijo */
    }

    /* Buscador fijo, centrado y semitransparente */
    #buscador {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px;
      border: 2px solid var(--main-color);
      border-radius: 25px;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      z-index: 2000;
      width: 80%;
      /* móviles */
      max-width: 400px;
      text-align: center;
      /* cursor y texto centrados */
    }

    @media (min-width: 768px) {
      #buscador {
        width: 30%;
        /* pantallas medianas y grandes */
      }
    }

    #buscador::placeholder {
      color: #666;
      font-style: italic;
      text-align: center;
    }

    /* Área principal */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* Loader */
    #loader {
      display: none;
      text-align: center;
      margin: 20px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--main-color);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* Grid responsivo para cards */
    #contenedor {
      display: grid;
      justify-content: center;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    /* Cards */
    .card {
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card h3 {
      margin: 0;
      font-size: 15px;
      color: #555;
    }

    .card h2 {
      margin: 6px 0 12px;
      font-size: 18px;
      color: var(--main-color);
      text-align: center;
    }

    /* Botones dentro de las cards */
    .btn-group {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .btn-link {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 13px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s ease;
    }

    .btn-completa {
      background: var(--main-color);
      color: #fff !important;
    }

    .btn-completa:hover {
      background: #004c99;
    }

    .btn-rapida {
      background: var(--secondary-color);
      color: #fff !important;
    }

    .btn-rapida:hover {
      background: #008855;
    }

    /* Paginador */
    #paginador {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px 0;
    }

    #paginador button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      background: var(--main-color);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    #paginador button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* Footer */
    footer {
      background: #f9f9f9;
      text-align: center;
      padding: 15px;
      font-size: 14px;
      border-top: 1px solid #eee;
    }

    /* Ajustes móviles */
    @media (max-width: 600px) {
      header {
        font-size: 18px;
      }

      .card {
        padding: 12px;
      }

      .card h2 {
        font-size: 16px;
      }

      #buscador {
        font-size: 14px;
      }
    }
  </style>


</head>

<body>
  <header>Catálogo Maestro de Guías de Práctica Clínica</header>
  <input type="text" id="buscador" placeholder="🔍 Escribe para buscar...">
  <div id="loader">
    <div class="spinner"></div>
  </div>
  <main id="contenedor"></main>
  <div id="paginador"></div>
  <footer>
    <p id="footerText">Hecho con ❤️ por
      <a href="https://ricardoim1.github.io/jeronimoricardo/" id="footerLink"
        style="color: inherit; text-decoration: none;" target="_blank">Ricardo</a> ·
      <span id="year"></span>
    </p>
  </footer>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzMG7NjI7kRmXHe1HwH3d05f2Biz6Hqa83G2TU3lpMZtfEDMTGHAIlKTsSe5HNPN8TD/exec";
    let datos = [];
    let paginaActual = 1;
    const registrosPorPagina = 18;

    document.getElementById("loader").style.display = "block";

    fetch(scriptURL)
      .then(res => res.json())
      .then(data => {
        datos = data;
        document.getElementById("loader").style.display = "none";
        renderPagina();
      })
      .catch(err => console.error(err));

    function renderPagina() {
      const contenedor = document.getElementById("contenedor");
      contenedor.innerHTML = "";
      const inicio = (paginaActual - 1) * registrosPorPagina;
      const fin = inicio + registrosPorPagina;
      const paginaDatos = datos.slice(inicio, fin);

      paginaDatos.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <h3>${item.CLAVE}</h3>
          <h2>${item["NOMBRE GUIA"]}</h2>
          <div class="btn-group">
            <a href="${item.URL_COMPLETA}" target="_blank" class="btn-link btn-completa">Completa</a>
            <a href="${item.URL_RAPIDA}" target="_blank" class="btn-link btn-rapida">Rápida</a>
          </div>
        `;
        contenedor.appendChild(card);
      });

      renderPaginador();
    }

    function renderPaginador() {
      const paginador = document.getElementById("paginador");
      paginador.innerHTML = "";
      const totalPaginas = Math.ceil(datos.length / registrosPorPagina);

      const prevBtn = document.createElement("button");
      prevBtn.textContent = "Anterior";
      prevBtn.disabled = paginaActual === 1;
      prevBtn.onclick = () => { paginaActual--; renderPagina(); };
      paginador.appendChild(prevBtn);

      const nextBtn = document.createElement("button");
      nextBtn.textContent = "Siguiente";
      nextBtn.disabled = paginaActual === totalPaginas;
      nextBtn.onclick = () => { paginaActual++; renderPagina(); };
      paginador.appendChild(nextBtn);
    }

    document.getElementById("buscador").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      const filtrados = datos.filter(item =>
        item.CLAVE.toString().toLowerCase().includes(q) ||
        item["NOMBRE GUIA"].toLowerCase().includes(q)
      );
      paginaActual = 1;
      datos = filtrados;
      renderPagina();
    });

    // Footer link handler
    document.addEventListener('click', function (e) {
      if (e.target.id === 'footerLink' || e.target.closest('#footerLink')) {
        e.preventDefault();
        window.open('https://ricardoim1.github.io/jeronimoricardo/', '_blank');
      }
    });

    // Actualizar año automáticamente
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>

</html>
