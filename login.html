  <script>
    // ========== SISTEMA DE ESTADO ==========
    let intensidadUso = 0;
    let respiracionInterval;

    function iniciarRespiracion() {
      const dashboard = document.querySelector(".glass");
      if (!dashboard) return;

      clearInterval(respiracionInterval);

      let fase = 0;
      respiracionInterval = setInterval(() => {
        fase += 0.02;
        const intensidad = Math.min(0.15 + intensidadUso / 80, 0.4);
        const escala = 1 + Math.sin(fase) * intensidad * 0.02;
        dashboard.style.transform = `scale(${escala})`;
      }, 500);
    }

    function setEstado(estado, mensaje = null) {
      const dashboard = document.querySelector(".glass");
      const messageDiv = document.getElementById("message");
      if (!dashboard) return;

      intensidadUso = Math.min(intensidadUso + 1, 10);
      iniciarRespiracion();
      setTimeout(
        () => (intensidadUso = Math.max(intensidadUso - 1, 0)),
        8000
      );

      dashboard.classList.remove("loading", "success", "error");
      dashboard.classList.add(estado);

      if (messageDiv) {
        const iconos = {
          loading:
            '<i class="fas fa-sync fa-spin"></i> Validando credenciales...',
          success: '<i class="fas fa-check-circle"></i> ¡ACCESO EXITOSO! <br>',
          error: '<i class="fas fa-exclamation-circle"></i> ',
        };
        messageDiv.innerHTML = mensaje
          ? iconos[estado] + mensaje
          : iconos[estado];
        messageDiv.style.color = estado === "error" ? "#f87171" : "white";
        messageDiv.style.opacity = "1";
      }

      if (estado !== "success") {
        setTimeout(() => {
          dashboard.classList.remove("loading", "success", "error");
        }, 5000);
      }
    }
  </script>

        console.error("❌ Error de login:", resultado.error);
      }
    };

    // ✅ Función global para verificar el servidor
    window.verificarServidorCallback = function (res) {
      console.log("✅ Servidor activo:", res);
      // Remover el script después de usarlo
      const script = document.getElementById("server-check-script");
      if (script) script.remove();
    };

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      setEstado("loading");

      const usuario = document.getElementById("usuario").value.trim();
      const clave = document.getElementById("clave").value;

      if (!usuario || !clave) {
        setEstado("error", "Usuario y contraseña son requeridos");
        return;
      }

      console.log("📤 Enviando credenciales:", { usuario, clave });

      // ✅ JSONP - Crear script dinámico (GET)
      const script = document.createElement("script");
      script.id = "jsonp-script";

      // Parámetros por URL (GET)
      const params = new URLSearchParams({
        usuario: usuario,
        clave: clave,
        callback: "manejarLogin", // ✅ Nombre de función global
        ip: "web", // Para logs
      });

      script.src = `${scriptUrl}?${params.toString()}`;
      console.log("🔗 URL llamada:", script.src);

      document.head.appendChild(script);

      // Timeout por si falla
      setTimeout(() => {
        const scriptElement = document.getElementById("jsonp-script");
        if (scriptElement) {
          scriptElement.remove();
          setEstado("error", "Timeout - No response from server");
        }
      }, 10000);
    });

    form.addEventListener("reset", () => {
      const messageDiv = document.getElementById("message");
      messageDiv.innerHTML = "";
      messageDiv.style.opacity = "0";
    });

    // ✅ Verificar sesión existente
    function verificarSesion() {
      const usuario = localStorage.getItem("usuario");
      const loginTime = localStorage.getItem("loginTime");
      const ahora = new Date().getTime();

      // Si hay sesión y no ha expirado (24 horas)
      if (usuario && loginTime && ahora - loginTime < 24 * 60 * 60 * 1000) {
        console.log("Sesión activa para:", usuario);
        // Opcional: redirigir automáticamente
        // window.location.href = 'dashboard.html';
      } else {
        // Limpiar sesión expirada
        localStorage.removeItem("usuario");
        localStorage.removeItem("rol");
        localStorage.removeItem("loginTime");
      }
    }

    // ✅ Verificar servidor al cargar (CORREGIDO)
    function verificarServidor() {
      try {
        const script = document.createElement("script");
        script.id = "server-check-script";
        // ✅ Usar nombre de función global, no función anónima
        script.src = `${scriptUrl}?callback=verificarServidorCallback`;
        document.head.appendChild(script);

        // Limpiar después de 3 segundos si no responde
        setTimeout(() => {
          const oldScript = document.getElementById("server-check-script");
          if (oldScript) oldScript.remove();
        }, 3000);
      } catch (error) {
        console.log("❌ No se pudo conectar al servidor:", error);
      }
    }

    window.addEventListener("load", function () {
      iniciarRespiracion();
      verificarSesion();
      verificarServidor();
    });

    // ✅ Función para cerrar sesión (usar en otras páginas)
    window.cerrarSesion = function () {
      localStorage.removeItem("usuario");
      localStorage.removeItem("rol");
      localStorage.removeItem("loginTime");
      window.location.href = "/estadisticas/index.html";
    };

    // Función para obtener efemérides del mes actual
    function getEfemeridesMesActual() {
      const fecha = new Date();
      const mesActual = fecha.getMonth(); // 0-11
      const diaActual = fecha.getDate();

      // Filtrar efemérides del mes actual
      const delMes = efemeridesSalud.filter(ef => ef.mes === mesActual);

      // Ordenar por día
      delMes.sort((a, b) => a.dia - b.dia);

      return delMes;
    }

    // Función para obtener efemérides próximas (siguientes 30 días)
    function getEfemeridesProximas() {
      const fecha = new Date();
      const mesActual = fecha.getMonth();
      const diaActual = fecha.getDate();

      const proximas = [];

      // Buscar en los próximos 30 días
      for (let i = 0; i <= 30; i++) {
        const fechaCheck = new Date(); fechaCheck.setDate(fecha.getDate() + i); const
          mes = fechaCheck.getMonth(); const dia = fechaCheck.getDate(); const efemeride = efemeridesSalud.find(ef => ef.mes ===
            mes && ef.dia === dia);
        if (efemeride) {
          proximas.push({
            ...efemeride,
            diasFaltantes: i,
            esHoy: i === 0
          });
        }
      }

      return proximas.slice(0, 3); // Mostrar solo las 3 más próximas
    }

    // Función para obtener efemérides próximas (siguientes 30 días)
    function getEfemeridesProximas() {
      const fecha = new Date();
      const proximas = [];

      // Crear un array con los objetos de fecha para los próximos 30 días
      for (let i = 1; i <= 30; i++) { // Empezamos desde 1 para excluir el día actual
        const fechaCheck = new Date();
        fechaCheck.setDate(fecha.getDate() + i);
        const mes = fechaCheck.getMonth();
        const dia = fechaCheck.getDate();

        // Buscar si hay alguna efeméride en esta fecha
        const efemeride = efemeridesSalud.find(ef => ef.mes === mes && ef.dia === dia);

        if (efemeride) {
          // Calcular días faltantes de manera precisa
          const fechaEfemeride = new Date(fecha.getFullYear(), mes, dia);
          const diferenciaTiempo = fechaEfemeride - fecha;
          const diasFaltantes = Math.ceil(diferenciaTiempo / (1000 * 60 * 60 * 24));

          proximas.push({
            ...efemeride,
            fecha: fechaEfemeride,
            diasFaltantes: diasFaltantes,
            mes: mes,
            dia: dia
          });
        }
      }

      // Ordenar por fecha más próxima
      proximas.sort((a, b) => a.diasFaltantes - b.diasFaltantes);

      return proximas;
    }

    // Función para obtener efemérides que incluyan también el día actual si aplica
    function getEfemeridesProximasIncluyendoHoy() {
      const fecha = new Date();
      const mesActual = fecha.getMonth();
      const diaActual = fecha.getDate();
      const proximas = [];

      // Verificar si hoy hay alguna efeméride
      const efemerideHoy = efemeridesSalud.find(ef => ef.mes === mesActual && ef.dia === diaActual);

      if (efemerideHoy) {
        proximas.push({
          ...efemerideHoy,
          diasFaltantes: 0,
          esHoy: true
        });
      }

      // Buscar en los próximos 30 días (empezando desde 1 para no duplicar hoy)
      for (let i = 1; i <= 30; i++) {
        const fechaCheck = new Date(); fechaCheck.setDate(fecha.getDate() + i); const
          mes = fechaCheck.getMonth(); const dia = fechaCheck.getDate(); const efemeride = efemeridesSalud.find(ef => ef.mes
            === mes && ef.dia === dia);

        if (efemeride) {
          proximas.push({
            ...efemeride,
            diasFaltantes: i,
            esHoy: false
          });
        }
      }

      return proximas.slice(0, 5); // Mostrar hasta 5 efemérides próximas
    }

    // Función para actualizar el tile con efemérides próximas
    function actualizarEfemerides() {
      const lista = document.getElementById('efemerides-lista');
      if (!lista) return;

      // Obtener efemérides próximas (puedes elegir cualquiera de las dos funciones)
      const efemeridesProximas = getEfemeridesProximas(); // Excluye el día actual
      // const efemeridesProximas = getEfemeridesProximasIncluyendoHoy(); // Incluye el día actual si hay

      // Limpiar lista actual
      lista.innerHTML = '';

      // Mostrar las efemérides próximas
      if (efemeridesProximas.length > 0) {
        efemeridesProximas.slice(0, 4).forEach(ef => { // Mostrar hasta 4
          const item = document.createElement('li');
          const diaFormateado = ef.dia.toString().padStart(2, '0');
          const meses = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];

          let textoDias = '';
          if (ef.diasFaltantes === 0) {
            textoDias = '🔴 HOY';
          } else if (ef.diasFaltantes === 1) {
            textoDias = '⏰ MAÑANA';
          } else {
            textoDias = `📅 ${ef.diasFaltantes} días`;
          }

          item.innerHTML = `${ef.icono} <strong>${diaFormateado} ${meses[ef.mes]}</strong> — ${ef.descripcion} <span
            style="opacity:0.7; font-size:0.8rem;">${textoDias}</span>`;
          lista.appendChild(item);
        });

        // Si hay más de 4, mostrar cuántas faltan
        if (efemeridesProximas.length > 4) {
          const item = document.createElement('li');
          item.style.opacity = '0.7';
          item.style.fontStyle = 'italic';
          item.style.fontSize = '0.8rem';
          item.innerHTML = `↻ y ${efemeridesProximas.length - 4} más en los próximos 30 días`;
          lista.appendChild(item);
        }
      } else {
        // Si no hay efemérides en los próximos 30 días, mostrar un mensaje
        const item = document.createElement('li');
        item.style.opacity = '0.7';
        item.style.fontStyle = 'italic';
        item.innerHTML = '✨ No hay efemérides en los próximos 30 días';
        lista.appendChild(item);
      }
    }

    // También puedes crear una versión que muestre las del mes actual PERO
    // ordenadas desde el día actual hacia adelante
    function getEfemeridesMesDesdeHoy() {
      const fecha = new Date();
      const mesActual = fecha.getMonth();
      const diaActual = fecha.getDate();

      // Obtener todas las efemérides del mes actual
      const delMes = efemeridesSalud.filter(ef => ef.mes === mesActual);

      // Separar las que ya pasaron y las que están por venir
      const pasadas = delMes.filter(ef => ef.dia < diaActual); const futuras = delMes.filter(ef => ef.dia >=
        diaActual);

      // Ordenar futuras por día (ascendente) y pasadas por día (descendente)
      futuras.sort((a, b) => a.dia - b.dia);
      pasadas.sort((a, b) => b.dia - a.dia);

      // Combinar: primero las futuras, luego las pasadas (o viceversa según prefieras)
      return [...futuras, ...pasadas];
    }

    // Función alternativa que muestra las del mes actual pero destacando las próximas
    function actualizarEfemeridesDestacandoProximas() {
      const lista = document.getElementById('efemerides-lista');
      if (!lista) return;

      const fecha = new Date();
      const diaActual = fecha.getDate();
      const efemeridesMes = getEfemeridesMesDesdeHoy();

      lista.innerHTML = '';

      if (efemeridesMes.length > 0) {
        // Mostrar las próximas primero (hasta 3)
        const proximas = efemeridesMes.filter(ef => ef.dia >= diaActual).slice(0, 3);
        const pasadas = efemeridesMes.filter(ef => ef.dia < diaActual).slice(0, 2); proximas.forEach(ef => {
          const item = document.createElement('li');
          const diaFormateado = ef.dia.toString().padStart(2, '0');
          const meses = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
          const destacado = ef.dia === diaActual ? ' 🔴 HOY' : ef.dia > diaActual ? ' ⏰' : '';

          item.innerHTML = `${ef.icono} ${diaFormateado} ${meses[ef.mes]} — ${ef.descripcion}${destacado}`;
          if (ef.dia === diaActual) {
            item.style.fontWeight = 'bold';
            item.style.backgroundColor = 'rgba(255, 255, 255, 0.1)';
            item.style.borderRadius = '4px';
            item.style.padding = '2px 4px';
          }
          lista.appendChild(item);
        });

        // Si hay más efemérides próximas, indicarlo
        const totalProximas = efemeridesMes.filter(ef => ef.dia >= diaActual).length;
        if (totalProximas > 3) {
          const item = document.createElement('li');
          item.style.opacity = '0.7';
          item.style.fontStyle = 'italic';
          item.style.fontSize = '0.8rem';
          item.innerHTML = `↻ y ${totalProximas - 3} más próximas este mes`;
          lista.appendChild(item);
        } else if (pasadas.length > 0) {
          // Mostrar algunas pasadas si no hay muchas próximas
          const item = document.createElement('li');
          item.style.opacity = '0.5';
          item.style.fontStyle = 'italic';
          item.style.fontSize = '0.8rem';
          item.innerHTML = `📅 Ya pasaron: ${pasadas.map(p => `${p.dia} ${meses[p.mes]}`).join(', ')}`;
          lista.appendChild(item);
        }
      }
    }

    // Ejecutar al cargar la página (elige la función que prefieras)
    document.addEventListener('DOMContentLoaded', actualizarEfemerides);
    // document.addEventListener('DOMContentLoaded', actualizarEfemeridesDestacandoProximas);

    // Actualizar cada hora para mantener precisión
    setInterval(actualizarEfemerides, 3600000); // Cada hora

    // Ejecutar al cargar la página
    document.addEventListener('DOMContentLoaded', actualizarEfemerides);

    // Opcional: Actualizar cada día (si la página permanece abierta)
    // setInterval(actualizarEfemerides, 86400000); // 24 horas en ms
  </script>
