<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏥 Hospital Regional PV - Gestión de Datos</title>
    
    <style>
        /* ============================================
           RESET Y ESTILOS BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #e0e5ec;
            padding: 20px;
        }

        /* ============================================
           CONTENEDOR PRINCIPAL
           ============================================ */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: #e0e5ec;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 
                9px 9px 16px rgba(163, 177, 198, 0.6),
                -9px -9px 16px rgba(255, 255, 255, 0.8);
        }

        /* ============================================
           HEADER
           ============================================ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px 30px;
            border-radius: 30px;
            background: #e0e5ec;
            box-shadow: 
                inset 2px 2px 5px rgba(163, 177, 198, 0.6),
                inset -5px -5px 10px rgba(255, 255, 255, 0.7);
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2c3e50;
            letter-spacing: -0.5px;
        }

        .header .badge {
            padding: 8px 20px;
            border-radius: 50px;
            background: #e0e5ec;
            box-shadow: 
                3px 3px 6px rgba(163, 177, 198, 0.6),
                -3px -3px 6px rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            color: #2c3e50;
            font-weight: 600;
        }

        /* ============================================
           PESTAÑAS
           ============================================ */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            padding: 15px;
            border-radius: 30px;
            background: #e0e5ec;
            box-shadow: 
                inset 2px 2px 5px rgba(163, 177, 198, 0.5),
                inset -5px -5px 10px rgba(255, 255, 255, 0.7);
        }

        .tab-btn {
            padding: 10px 22px;
            border: none;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #e0e5ec;
            box-shadow: 
                3px 3px 6px rgba(163, 177, 198, 0.6),
                -3px -3px 6px rgba(255, 255, 255, 0.7);
            white-space: nowrap;
        }

        .tab-btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                5px 5px 10px rgba(163, 177, 198, 0.7),
                -5px -5px 10px rgba(255, 255, 255, 0.8);
        }

        .tab-btn.active {
            background: #e0e5ec;
            box-shadow: 
                inset 3px 3px 6px rgba(163, 177, 198, 0.6),
                inset -3px -3px 6px rgba(255, 255, 255, 0.7);
            color: #1a73e8;
        }

        .tab-btn .tab-number {
            display: inline-block;
            width: 22px;
            height: 22px;
            line-height: 22px;
            text-align: center;
            border-radius: 50%;
            font-size: 0.7rem;
            font-weight: 700;
            margin-right: 6px;
            background: #e0e5ec;
            box-shadow: 
                inset 1px 1px 3px rgba(163, 177, 198, 0.5),
                inset -1px -1px 3px rgba(255, 255, 255, 0.7);
        }

        .tab-btn.active .tab-number {
            background: #1a73e8;
            color: white;
            box-shadow: none;
        }

        /* ============================================
           TOOLBAR
           ============================================ */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
            padding: 15px 20px;
            border-radius: 20px;
            background: #e0e5ec;
            box-shadow: 
                inset 2px 2px 5px rgba(163, 177, 198, 0.5),
                inset -2px -2px 5px rgba(255, 255, 255, 0.7);
        }

        .toolbar .info {
            font-size: 0.95rem;
            color: #34495e;
            font-weight: 500;
        }

        .toolbar .info span {
            font-weight: 700;
            color: #1a73e8;
        }

        .btn-neo {
            padding: 10px 24px;
            border: none;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #e0e5ec;
            box-shadow: 
                3px 3px 6px rgba(163, 177, 198, 0.6),
                -3px -3px 6px rgba(255, 255, 255, 0.7);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-neo:hover {
            transform: translateY(-2px);
            box-shadow: 
                5px 5px 12px rgba(163, 177, 198, 0.7),
                -5px -5px 12px rgba(255, 255, 255, 0.8);
        }

        .btn-neo:active {
            transform: translateY(0);
            box-shadow: 
                inset 3px 3px 6px rgba(163, 177, 198, 0.6),
                inset -3px -3px 6px rgba(255, 255, 255, 0.7);
        }

        .btn-neo.primary {
            color: #1a73e8;
        }

        .btn-neo.danger {
            color: #e74c3c;
        }

        .btn-neo.success {
            color: #27ae60;
        }

        /* ============================================
           GRID DE CARDS
           ============================================ */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            padding: 5px;
        }

        /* ============================================
           CARD INDIVIDUAL (NEOMÓRFICA)
           ============================================ */
        .data-card {
            background: #e0e5ec;
            border-radius: 24px;
            padding: 20px 22px;
            box-shadow: 
                8px 8px 16px rgba(163, 177, 198, 0.6),
                -8px -8px 16px rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .data-card:hover {
            transform: translateY(-4px);
            box-shadow: 
                12px 12px 20px rgba(163, 177, 198, 0.7),
                -12px -12px 20px rgba(255, 255, 255, 0.8);
        }

        .data-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(163, 177, 198, 0.2);
        }

        .data-card .card-header .card-title {
            font-weight: 700;
            font-size: 0.9rem;
            color: #2c3e50;
            flex: 1;
        }

        .data-card .card-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .data-card .card-actions button {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #e0e5ec;
            box-shadow: 
                2px 2px 4px rgba(163, 177, 198, 0.5),
                -2px -2px 4px rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .data-card .card-actions button:hover {
            transform: scale(1.1);
        }

        .data-card .card-actions .edit-btn {
            color: #1a73e8;
        }

        .data-card .card-actions .delete-btn {
            color: #e74c3c;
        }

        .data-card .card-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 16px;
        }

        .data-card .field-item {
            display: flex;
            flex-direction: column;
            padding: 4px 0;
            border-bottom: 1px solid rgba(163, 177, 198, 0.1);
        }

        .data-card .field-item .field-label {
            font-size: 0.6rem;
            font-weight: 600;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-card .field-item .field-value {
            font-size: 0.8rem;
            color: #2c3e50;
            font-weight: 500;
            word-break: break-word;
            margin-top: 1px;
        }

        .data-card .field-item .field-value.si {
            color: #27ae60;
        }

        .data-card .field-item .field-value.no {
            color: #e74c3c;
        }

        .data-card .field-item.full-width {
            grid-column: 1 / -1;
        }

        .data-card .card-footer {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 2px solid rgba(163, 177, 198, 0.15);
            font-size: 0.65rem;
            color: #95a5a6;
            text-align: right;
        }

        /* ============================================
           MODAL
           ============================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #e0e5ec;
            border-radius: 40px;
            padding: 35px;
            max-width: 900px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 
                15px 15px 30px rgba(163, 177, 198, 0.7),
                -15px -15px 30px rgba(255, 255, 255, 0.8);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(163, 177, 198, 0.2);
        }

        .modal-header h2 {
            font-size: 1.4rem;
            color: #2c3e50;
        }

        .modal-close {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            background: #e0e5ec;
            box-shadow: 
                3px 3px 6px rgba(163, 177, 198, 0.6),
                -3px -3px 6px rgba(255, 255, 255, 0.7);
            color: #2c3e50;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            transform: rotate(90deg);
        }

        .modal .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        .modal .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .modal .form-group.full-width {
            grid-column: 1 / -1;
        }

        .modal .form-group label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #34495e;
        }

        .modal .form-group input,
        .modal .form-group select,
        .modal .form-group textarea {
            padding: 8px 12px;
            border: none;
            border-radius: 12px;
            font-size: 0.8rem;
            background: #e0e5ec;
            box-shadow: 
                inset 2px 2px 6px rgba(163, 177, 198, 0.5),
                inset -2px -2px 6px rgba(255, 255, 255, 0.7);
            color: #2c3e50;
            transition: all 0.3s ease;
            outline: none;
            width: 100%;
        }

        .modal .form-group input:focus,
        .modal .form-group select:focus,
        .modal .form-group textarea:focus {
            box-shadow: 
                inset 3px 3px 8px rgba(26, 115, 232, 0.2),
                inset -3px -3px 8px rgba(255, 255, 255, 0.8),
                0 0 0 2px rgba(26, 115, 232, 0.2);
        }

        .modal .form-group textarea {
            resize: vertical;
            min-height: 40px;
        }

        .modal-footer {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding-top: 15px;
            border-top: 2px solid rgba(163, 177, 198, 0.2);
        }

        /* ============================================
           ESTADOS
           ============================================ */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #34495e;
            font-size: 1.1rem;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #95a5a6;
            font-size: 1.1rem;
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 1200px) {
            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header {
                flex-direction: column;
                text-align: center;
                padding: 15px;
            }

            .header h1 {
                font-size: 1.3rem;
            }

            .tabs {
                gap: 6px;
                padding: 10px;
                justify-content: center;
            }

            .tab-btn {
                padding: 6px 14px;
                font-size: 0.75rem;
            }

            .tab-btn .tab-number {
                display: none;
            }

            .cards-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .data-card .card-body {
                grid-template-columns: 1fr;
            }

            .modal {
                padding: 20px;
                margin: 10px;
            }

            .modal .form-grid {
                grid-template-columns: 1fr;
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }

            .btn-neo {
                justify-content: center;
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 10px;
                border-radius: 25px;
            }

            .tab-btn {
                padding: 4px 10px;
                font-size: 0.65rem;
            }

            .data-card {
                padding: 15px;
            }
        }

        /* Scroll del modal */
        .modal::-webkit-scrollbar {
            width: 6px;
        }

        .modal::-webkit-scrollbar-track {
            background: #e0e5ec;
            border-radius: 10px;
        }

        .modal::-webkit-scrollbar-thumb {
            background: #b0b8c8;
            border-radius: 10px;
        }

        .modal::-webkit-scrollbar-thumb:hover {
            background: #9aa3b5;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <h1>🏥 Hospital Regional PV</h1>
            <div class="badge">
                🟢 <span id="statusText">Conectado</span>
            </div>
        </header>

        <!-- PESTAÑAS -->
        <nav class="tabs" id="tabsContainer"></nav>

        <!-- CONTENIDO PRINCIPAL -->
        <main>
            <div class="toolbar">
                <div class="info">
                    📋 <span id="sheetNameDisplay">Cargando...</span> · 
                    <span id="rowCountDisplay">0</span> registros · 
                    <span id="fieldCountDisplay">0</span> campos
                </div>
                <button class="btn-neo primary" id="btnAdd">
                    ➕ Agregar
                </button>
            </div>

            <div id="contentContainer">
                <div class="loading">Cargando datos</div>
            </div>
        </main>
    </div>

    <!-- ============================================
    MODAL
    ============================================ -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">📝 Agregar Registro</h2>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <form id="modalForm">
                <div class="form-grid" id="formFields"></div>
                <div class="modal-footer">
                    <button type="button" class="btn-neo" id="btnCancel">Cancelar</button>
                    <button type="submit" class="btn-neo primary" id="btnSave">💾 Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============================================
    JAVASCRIPT
    ============================================ -->
    <script>
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        const API_URL = 'https://corsproxy.io/?' + encodeURIComponent('https://script.google.com/macros/s/AKfycbxIFwauBmMFog0jXZ_F0jowhP4Ki_PoOuQjB3jpYYD-bizR5UrH10wzcwv7abbft-eW/exec');

        const TABS = [
            { id: 'ORDEN 1', label: '📊 Datos Generales' },
            { id: 'ORDEN 11-1', label: '👨‍⚕️ RH - Plazas' },
            { id: 'ORDEN 11-2', label: '👩‍⚕️ RH - Ocupadas' },
            { id: 'ORDEN 11-3', label: '📉 RH - Desocupadas' },
            { id: 'ORDEN 2-2', label: '🏥 Serv. Médicos 1' },
            { id: 'ORDEN 2-3', label: '🏥 Serv. Médicos 2' },
            { id: 'ORDEN 3', label: '🚑 Serv. Apoyo' },
            { id: 'ORDEN  4', label: '🔧 Serv. Generales' },
            { id: 'ORDEN 5', label: '📋 Administrativas' },
            { id: 'ORDEN 6', label: '📚 Enseñanza' },
            { id: 'ORDEN 7', label: '🔬 Investigación' }
        ];

        let state = {
            currentTab: 'ORDEN 1',
            data: [],
            headers: [],
            isEditing: false,
            editRowIndex: null,
            isLoading: false
        };

        // ============================================
        // DOM REFERENCIAS
        // ============================================
        const tabsContainer = document.getElementById('tabsContainer');
        const contentContainer = document.getElementById('contentContainer');
        const sheetNameDisplay = document.getElementById('sheetNameDisplay');
        const rowCountDisplay = document.getElementById('rowCountDisplay');
        const fieldCountDisplay = document.getElementById('fieldCountDisplay');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalForm = document.getElementById('modalForm');
        const formFields = document.getElementById('formFields');
        const btnAdd = document.getElementById('btnAdd');
        const btnCancel = document.getElementById('btnCancel');
        const btnSave = document.getElementById('btnSave');
        const modalClose = document.getElementById('modalClose');

        // ============================================
        // API
        // ============================================
        async function apiRequest(action, sheet, data = null, rowIndex = null) {
            try {
                let url = `${API_URL}?action=${action}&sheet=${encodeURIComponent(sheet)}`;
                if (rowIndex !== null) {
                    url += `&rowIndex=${rowIndex}`;
                }

                const options = {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                };

                if (data) {
                    options.method = 'POST';
                    options.body = JSON.stringify({ rowData: data });
                }

                const response = await fetch(url, options);
                const result = await response.json();

                if (result.error) {
                    throw new Error(result.error);
                }

                return result;
            } catch (error) {
                console.error('❌ Error en API:', error);
                throw error;
            }
        }

        // ============================================
        // FUNCIONES PRINCIPALES
        // ============================================
        async function loadData(sheetName) {
            if (state.isLoading) return;
            state.isLoading = true;
            contentContainer.innerHTML = '<div class="loading">Cargando datos</div>';

            try {
                const result = await apiRequest('read', sheetName);
                state.data = result.data || [];
                state.headers = result.headers || [];
                state.currentTab = sheetName;

                sheetNameDisplay.textContent = sheetName;
                rowCountDisplay.textContent = state.data.length;
                fieldCountDisplay.textContent = state.headers.length;

                renderCards();
            } catch (error) {
                contentContainer.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">⚠️</span>
                        Error al cargar datos: ${error.message}
                        <br><br>
                        <button class="btn-neo" onclick="loadData('${sheetName}')">🔄 Reintentar</button>
                    </div>
                `;
            } finally {
                state.isLoading = false;
            }
        }

        // ============================================
        // RENDER CARDS (TODOS LOS CAMPOS)
        // ============================================
        function renderCards() {
            if (state.data.length === 0) {
                contentContainer.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">📭</span>
                        No hay registros en esta hoja
                        <br><br>
                        <button class="btn-neo primary" onclick="openCreateModal()">
                            ➕ Agregar primer registro
                        </button>
                    </div>
                `;
                return;
            }

            let html = '<div class="cards-grid">';

            state.data.forEach((row, index) => {
                const firstValue = Object.values(row).find(v => v && v.toString().trim() !== '') || 'Registro';
                const title = typeof firstValue === 'string' && firstValue.length > 40 
                    ? firstValue.substring(0, 40) + '...' 
                    : firstValue;

                html += `
                    <div class="data-card">
                        <div class="card-header">
                            <div class="card-title">📌 ${title}</div>
                            <div class="card-actions">
                                <button class="edit-btn" onclick="openEditModal(${index})" title="Editar">✏️</button>
                                <button class="delete-btn" onclick="deleteRow(${index})" title="Eliminar">🗑️</button>
                            </div>
                        </div>
                        <div class="card-body">
                `;

                // MOSTRAR TODOS LOS CAMPOS
                state.headers.forEach(header => {
                    const value = row[header] || '';
                    const isBoolean = typeof value === 'string' && 
                                     (value.toUpperCase() === 'SI' || value.toUpperCase() === 'NO');
                    const valueClass = isBoolean ? (value.toUpperCase() === 'SI' ? 'si' : 'no') : '';
                    const isLong = value.toString().length > 30;

                    html += `
                        <div class="field-item ${isLong ? 'full-width' : ''}">
                            <span class="field-label">${header}</span>
                            <span class="field-value ${valueClass}">${value || '—'}</span>
                        </div>
                    `;
                });

                html += `
                        </div>
                        <div class="card-footer">
                            Registro #${index + 1}
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            contentContainer.innerHTML = html;
        }

        // ============================================
        // PESTAÑAS
        // ============================================
        function renderTabs() {
            tabsContainer.innerHTML = '';
            TABS.forEach((tab, index) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${tab.id === state.currentTab ? 'active' : ''}`;
                btn.innerHTML = `<span class="tab-number">${index + 1}</span> ${tab.label}`;
                btn.dataset.sheet = tab.id;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadData(tab.id);
                });
                tabsContainer.appendChild(btn);
            });
        }

        // ============================================
        // MODAL - CREAR / EDITAR
        // ============================================
        function openCreateModal() {
            state.isEditing = false;
            state.editRowIndex = null;
            modalTitle.textContent = '📝 Agregar Registro';
            renderFormFields({});
            modalOverlay.classList.add('active');
        }

        function openEditModal(index) {
            state.isEditing = true;
            state.editRowIndex = index;
            modalTitle.textContent = '✏️ Editar Registro';
            renderFormFields(state.data[index] || {});
            modalOverlay.classList.add('active');
        }

        function renderFormFields(rowData) {
            // MOSTRAR TODOS LOS CAMPOS
            let html = '';
            state.headers.forEach(header => {
                const value = rowData[header] || '';
                const isBoolean = typeof value === 'string' && 
                                 (value.toUpperCase() === 'SI' || value.toUpperCase() === 'NO' || value === '');
                const isNumber = !isNaN(value) && value !== '' && !isBoolean;

                html += `
                    <div class="form-group">
                        <label for="field_${header}">${header}</label>
                        ${isBoolean ? `
                            <select id="field_${header}" name="${header}">
                                <option value="">Seleccionar</option>
                                <option value="SI" ${value.toUpperCase() === 'SI' ? 'selected' : ''}>SI</option>
                                <option value="NO" ${value.toUpperCase() === 'NO' ? 'selected' : ''}>NO</option>
                            </select>
                        ` : `
                            <input type="${isNumber ? 'number' : 'text'}" 
                                   id="field_${header}" 
                                   name="${header}" 
                                   value="${value}" />
                        `}
                    </div>
                `;
            });

            formFields.innerHTML = html;
        }

        function collectFormData() {
            const formData = {};
            const inputs = formFields.querySelectorAll('input, select, textarea');
            inputs.forEach(input => {
                formData[input.name] = input.value;
            });
            return formData;
        }

        // ============================================
        // GUARDAR
        // ============================================
        async function handleSave(event) {
            event.preventDefault();
            const formData = collectFormData();

            try {
                if (state.isEditing && state.editRowIndex !== null) {
                    await apiRequest('update', state.currentTab, formData, state.editRowIndex);
                } else {
                    await apiRequest('create', state.currentTab, formData);
                }

                closeModal();
                await loadData(state.currentTab);
            } catch (error) {
                alert(`❌ Error al guardar: ${error.message}`);
            }
        }

        // ============================================
        // ELIMINAR
        // ============================================
        async function deleteRow(index) {
            if (!confirm('⚠️ ¿Estás seguro de eliminar este registro?')) return;

            try {
                await apiRequest('delete', state.currentTab, null, index);
                await loadData(state.currentTab);
            } catch (error) {
                alert(`❌ Error al eliminar: ${error.message}`);
            }
        }

        // ============================================
        // MODAL CONTROLS
        // ============================================
        function closeModal() {
            modalOverlay.classList.remove('active');
        }

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        async function init() {
            renderTabs();
            await loadData('ORDEN 1');

            btnAdd.addEventListener('click', openCreateModal);
            btnCancel.addEventListener('click', closeModal);
            modalClose.addEventListener('click', closeModal);
            modalForm.addEventListener('submit', handleSave);

            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });

            document.getElementById('statusText').textContent = '✅ Conectado';
        }

        document.addEventListener('DOMContentLoaded', init);

        // Exponer funciones globales
        window.openCreateModal = openCreateModal;
        window.openEditModal = openEditModal;
        window.deleteRow = deleteRow;
        window.loadData = loadData;
        window.closeModal = closeModal;
    </script>
</body>
</html>
